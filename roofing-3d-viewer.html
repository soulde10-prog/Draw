<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>3D Roofing Viewer v2.0</title>\n    <style>\n        body { margin: 0; }\n        canvas { display: block; }\n        #controls { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.8); padding: 10px; border-radius: 5px; }\n    </style>\n</head>\n<body>\n    <div id="controls">\n        <h3>Roof Type</h3>\n        <select id="roofType">\n            <option value="gable">Gable</option>\n            <option value="hip">Hip</option>\n            <option value="flat">Flat</option>\n        </select>\n        <h3>Dimensions</h3>\n        <input type="number" id="width" placeholder="Width (m)" value="5">\n        <input type="number" id="length" placeholder="Length (m)" value="5">\n        <h3>Material</h3>\n        <select id="material">\n            <option value="asphalt">Asphalt</option>\n            <option value="metal">Metal</option>\n            <option value="tile">Tile</option>\n        </select>\n        <h3>View Mode</h3>\n        <select id="viewMode">\n            <option value="wireframe">Wireframe</option>\n            <option value="solid">Solid</option>\n        </select>\n        <button id="exportBtn">Export</button>\n    </div>\n    <script src="https://threejs.org/build/three.js"></script>\n    <script>\n        let scene, camera, renderer;\n        init();\n        animate();\n\n        function init() {\n            scene = new THREE.Scene();\n            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);\n            renderer = new THREE.WebGLRenderer();\n            renderer.setSize(window.innerWidth, window.innerHeight);\n            document.body.appendChild(renderer.domElement);\n            createRoof();\n            camera.position.z = 10;\n        }\n\n        function createRoof() {\n            // Roof creation logic based on type and dimensions\n            const width = parseFloat(document.getElementById('width').value);\n            const length = parseFloat(document.getElementById('length').value);\n            const geometry = new THREE.BoxGeometry(width, 1, length);\n            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });\n            const roof = new THREE.Mesh(geometry, material);\n            scene.add(roof);\n        }\n\n        document.getElementById('roofType').addEventListener('change', createRoof);\n        document.getElementById('width').addEventListener('change', createRoof);\n        document.getElementById('length').addEventListener('change', createRoof);\n        document.getElementById('material').addEventListener('change', function() {\n            // Change material logic here\n        });\n        document.getElementById('viewMode').addEventListener('change', function() {\n            const viewMode = this.value;\n            // Toggle view mode logic\n        });\n        document.getElementById('exportBtn').addEventListener('click', function() {\n            // Export logic here\n        });\n\n        function animate() {\n            requestAnimationFrame(animate);\n            renderer.render(scene, camera);\n        }\n    </script>\n</body>\n</html>
